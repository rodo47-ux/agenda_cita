{% extends "base.html" %}
{% block title %}Editar Cita · PatasCitas{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-md-10 col-lg-7">
    <div class="card shadow border-0">

      <div class="card-header bg-warning text-dark fs-5 fw-bold py-3">
        <i class="bi bi-pencil-square me-2"></i>Editar Cita — {{ cita.mascota }}
      </div>

      <div class="card-body p-4 p-md-5">
        <form method="POST" action="{{ url_for('modificar', id=cita.id) }}">

          <div class="mb-4">
            <label class="form-label fw-semibold">Nombre de la Mascota</label>
            <input type="text" name="mascota" class="form-control"
                   value="{{ cita.mascota }}" required>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Propietario</label>
            <input type="text" name="propietario" class="form-control"
                   value="{{ cita.propietario }}" required>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Especie</label>
            <select name="especie" class="form-select">
              {% for esp in ['Perro','Gato','Ave','Conejo','Otro'] %}
              <option value="{{ esp }}" {% if cita.especie == esp %}selected{% endif %}>
                {{ esp }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-5">
            <label class="form-label fw-semibold">Fecha de la Cita</label>
            <input type="date" name="fecha" class="form-control"
                   value="{{ cita.fecha }}" required>
          </div>

          <div class="d-flex gap-3">
            <button type="submit"
                    class="btn btn-outline-warning fw-semibold flex-fill rounded-pill py-2 text-dark">
              <i class="bi bi-check-circle me-1"></i>Guardar Cambios
            </button>
            <a href="{{ url_for('agenda') }}"
               class="btn btn-outline-secondary fw-semibold flex-fill rounded-pill py-2 text-center">
              <i class="bi bi-arrow-left me-1"></i>Cancelar
            </a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
