<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PatasCitas{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .navbar-gradient,
    footer.navbar-gradient {
      background: linear-gradient(135deg, #b91c1c 0%, #ea580c 55%, #f97316 100%);
    }
  </style>
</head>
<body class="bg-light">

<!-- ── Navbar ── -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-gradient shadow-sm">
  <div class="container position-relative">

    <!-- Brand izquierda -->
    <a class="navbar-brand fw-bold" href="{{ url_for('agenda') }}">
      <i class="bi bi-bandaid-fill me-2"></i>PatasCitas
    </a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menú centrado con mx-auto -->
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav mx-auto d-flex align-items-center gap-3">
        <li class="nav-item">
          <a class="nav-link fw-semibold" href="{{ url_for('agenda') }}">
            <i class="bi bi-calendar2-week me-1"></i>Agenda
          </a>
        </li>
        <li class="nav-item">
          <a class="btn btn-outline-light fw-semibold px-4 rounded-pill"
             href="{{ url_for('agendar') }}">
            <i class="bi bi-plus-circle me-1"></i>Nueva Cita
          </a>
        </li>
      </ul>
    </div>

  </div>
</nav>

<!-- ── Contenido ── -->
<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<!-- ── Footer ── -->
<footer class="navbar-gradient text-white py-4 mt-5">
  <div class="container text-center">
    <div class="mb-2 fs-5">
      <i class="bi bi-bandaid me-3"></i>
      <i class="bi bi-capsule me-3"></i>
      <i class="bi bi-scissors me-3"></i>
      <i class="bi bi-thermometer-half me-3"></i>
      <i class="bi bi-eye-fill"></i>
    </div>
    <p class="mb-0 fw-semibold">PatasCitas</p>
    <small class="opacity-75">© 2025 · Clínica Veterinaria Integral</small>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
