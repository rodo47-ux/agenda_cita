{% extends "base.html" %}
{% block title %}Nueva Cita · PatasCitas{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-md-10 col-lg-7">
    <div class="card shadow border-0">

      <div class="card-header navbar-gradient text-white fs-5 fw-bold py-3">
        <i class="bi bi-calendar-plus me-2"></i>Agendar Nueva Cita
      </div>

      <div class="card-body p-4 p-md-5">
        <form method="POST" action="{{ url_for('agendar') }}">

          <div class="mb-4">
            <label class="form-label fw-semibold">Nombre de la Mascota</label>
            <input type="text" name="mascota" class="form-control"
                   placeholder="ej. Firulais" required>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Propietario</label>
            <input type="text" name="propietario" class="form-control"
                   placeholder="Nombre del dueño" required>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Especie</label>
            <select name="especie" class="form-select">
              <option value="Perro">Perro</option>
              <option value="Gato">Gato</option>
              <option value="Ave">Ave</option>
              <option value="Conejo">Conejo</option>
              <option value="Otro">Otro</option>
            </select>
          </div>

          <div class="mb-5">
            <label class="form-label fw-semibold">Fecha de la Cita</label>
            <input type="date" name="fecha" class="form-control" required>
          </div>

          <div class="d-flex gap-3">
            <button type="submit"
                    class="btn btn-outline-danger fw-semibold flex-fill rounded-pill py-2">
              <i class="bi bi-check-circle me-1"></i>Guardar Cita
            </button>            
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
